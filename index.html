<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Potência da Guerra</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>
body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:Arial;
}
</style>

</head>

<body>

<h2>⚔️ Potência da Guerra</h2>

<script>

let player;
let cursors;
let enemies;
let bullets;

const config = {
type: Phaser.AUTO,
width: 800,
height: 500,
physics: {
default: 'arcade'
},
scene: {
preload: preload,
create: create,
update: update
}
};

const game = new Phaser.Game(config);

function preload(){

this.load.image('player','https://labs.phaser.io/assets/sprites/phaser-dude.png');
this.load.image('enemy','https://labs.phaser.io/assets/sprites/robot.png');
this.load.image('bullet','https://labs.phaser.io/assets/sprites/bullet.png');

}

function create(){

player = this.physics.add.image(400,250,'player');

cursors = this.input.keyboard.createCursorKeys();

bullets = this.physics.add.group();

enemies = this.physics.add.group();

for(let i=0;i<5;i++){
let enemy = enemies.create(Math.random()*800,Math.random()*500,'enemy');
enemy.setVelocity(Phaser.Math.Between(-100,100),Phaser.Math.Between(-100,100));
}

this.input.on('pointerdown',()=>{

let bullet = bullets.create(player.x,player.y,'bullet');

this.physics.moveToPointer(bullet,400);

});

this.physics.add.overlap(bullets,enemies,(bullet,enemy)=>{

bullet.destroy();
enemy.destroy();

});

}

function update(){

if(cursors.left.isDown){
player.x -= 4;
}

if(cursors.right.isDown){
player.x += 4;
}

if(cursors.up.isDown){
player.y -= 4;
}

if(cursors.down.isDown){
player.y += 4;
}

}

</script>

</body>
</html>
