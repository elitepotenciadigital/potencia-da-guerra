<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Potencia da Guerra</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="sky"></div>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <h1>Potencia da Guerra</h1>
          <p>Browser Strategy Game</p>
        </div>
        <div class="stats">
          <div class="pill">Player: <strong id="playerName"></strong></div>
          <div class="pill">Level: <strong id="playerLevel">1</strong></div>
          <div class="pill">XP: <strong id="playerXp">0</strong></div>
          <div class="pill">Trophies: <strong id="playerTrophies">0</strong></div>
          <div class="pill gold">Gold: <strong id="goldCount">0</strong></div>
          <div class="pill energy">Energy: <strong id="energyCount">0</strong></div>
        </div>
      </header>

      <main class="layout">
        <section class="left">
          <div class="panel">
            <h2>Build</h2>
            <div id="buildMenu" class="build-menu"></div>
          </div>

          <div class="panel">
            <h2>Base Grid</h2>
            <p class="hint" id="buildHint">Select a building, then tap an empty tile.</p>
            <div id="grid" class="grid"></div>
          </div>
        </section>

        <section class="right">
          <div class="panel">
            <h2>Selected Building</h2>
            <div id="selectedCard" class="selected-card">No building selected.</div>
            <button id="upgradeBtn" class="action">Upgrade Selected</button>
          </div>

          <div class="panel">
            <h2>Attack</h2>
            <div class="attack-row">
              <button id="findEnemyBtn" class="action">Find Enemy</button>
              <button id="attackBtn" class="action danger">Attack</button>
            </div>
            <div id="enemyCard" class="selected-card">No enemy selected.</div>
          </div>

          <div class="panel">
            <h2>Leaderboard (Local)</h2>
            <div id="leaderboard" class="leaderboard"></div>
          </div>

          <div class="panel">
            <h2>Battle Log</h2>
            <div id="log" class="log"></div>
          </div>
        </section>
      </main>
    </div>

    <div id="profileModal" class="modal">
      <div class="modal-card">
        <h3>Choose your player name</h3>
        <input id="profileNameInput" type="text" maxlength="18" placeholder="Your name" />
        <button id="startGameBtn" class="action">Start Game</button>
      </div>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
